# TenderNet on CoralOS — stock coral-server, no custom image.
#
#   docker compose up -d coral      # start coral-server (MCP coordinator)
#   .\dev.ps1                       # Windows: creates the session, opens the 4 agent terminals + dashboard
#   node scripts/demo.js            # macOS/Linux equivalent (see README Quick start)
#
# coral-server is a PURE MCP coordinator. The 4 TenderNet personas (coral-agents/*) run as `provider:
# local/executable` — coral-server's own container runs each one's startup.sh (which just hands back a
# connection URL), and the actual negotiating "brain" is the separate `claude` CLI session you start on
# the host in that agent's directory. Settlement is the Solana escrow contract (agent-side) —
# coral-server never holds a keypair.

services:

  # ── CoralOS — MCP bus that launches the agents per session ──────────────────
  coral:
    # Pinned by digest for reproducibility — this is what `:latest` resolved to on 2026-06-27.
    # Bump: docker pull ghcr.io/coral-protocol/coral-server:latest
    #       docker inspect --format '{{index .RepoDigests 0}}' ghcr.io/coral-protocol/coral-server:latest
    #       (browse tags: https://github.com/coral-protocol/coral-server/pkgs/container/coral-server)
    image: ghcr.io/coral-protocol/coral-server:latest
    container_name: coral
    ports:
      - "5555:5555"
    environment:
      - CONFIG_FILE_PATH=/config/coral.toml
      # Forwarded to the agents coral launches:
      - SELLER_WALLET=${WALLET}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - BUYER_KEYPAIR_B58=${BUYER_KEYPAIR_B58}
      - BUYER_MAX_SOL=${BUYER_MAX_SOL:-0.001}
      # LLM brain — Anthropic by default; set LLM_PROVIDER=openai + OPENAI_API_KEY to flip the market.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-}
      - LLM_MODEL=${LLM_MODEL:-}
      # TxODDS World Cup oracle (separate demo track, examples/txodds) — the `txline` service:
      - TXLINE_API_KEY=${TXLINE_API_KEY}
      - TXLINE_BASE_URL=${TXLINE_BASE_URL:-}
      - INFERENCE_MODEL=${INFERENCE_MODEL:-}
      # Set TRACE=1 to log coral_* calls + on-chain Explorer links in the agents.
      - TRACE=${TRACE:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./examples/agent-economy/config/coral.toml:/config/coral.toml:ro
      - ./coral-agents:/agents
    restart: unless-stopped
