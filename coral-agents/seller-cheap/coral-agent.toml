edition = 4

[agent]
name = "insight-research"
version = "0.1.0"
description = "Insight Research Ltd — UK public policy research consultancy specialising in citizen engagement and public services evaluation."
summary = "A UK research consultancy bidding on government procurement contracts."
readme = "Bids in the shared market thread (WANT -> BID), settles via escrow. Same image as seller-agent; PERSONA/FLOOR_SOL/SERVICES shape how it competes."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
SELLER_WALLET = { type = "string", description = "Devnet wallet pubkey that receives payments" }
AGENT_NAME = { type = "string", default = "insight-research", description = "Market identity (matches the registry name)" }
SERVICES = { type = "string", default = "govreport", description = "Inventory — comma-separated services this seller bids on" }
FLOOR_SOL = { type = "f64", default = 0.0002, description = "Cost floor — the LLM may never bid below this" }
PERSONA = { type = "string", default = "a budget-focused consulting firm that bids aggressively low to win contracts, but never below cost", description = "Bidding persona (LLM system prompt)" }
SERVICE = { type = "string", default = "govreport", description = "What deliverService returns: govreport | jupiter | coingecko | news | inference" }
SOLANA_RPC_URL = { type = "string", default = "", description = "Solana RPC URL (devnet)" }
ESCROW_DEADLINE_SECS = { type = "f64", default = 600, description = "Refund deadline for escrow deposits (seconds)" }
ANTHROPIC_API_KEY = { type = "string", default = "", description = "Anthropic key (default brain)" }
OPENAI_API_KEY = { type = "string", default = "", description = "OpenAI key — set with LLM_PROVIDER=openai to flip the brain" }
OPENAI_BASE_URL = { type = "string", default = "", description = "Custom OpenAI-compatible base URL (e.g. OpenRouter)" }
LLM_PROVIDER = { type = "string", default = "", description = "anthropic (default) | openai" }
LLM_MODEL = { type = "string", default = "", description = "Override the LLM model id" }
JUPITER_API_KEY = { type = "string", default = "", description = "Jupiter API key" }
TRACE = { type = "string", default = "", description = "Set to 1 to log CoralOS calls + on-chain steps" }

# Reuses the already-built seller-agent image — no separate build needed.
[runtimes.docker]
image = "seller-agent:0.1.0"
